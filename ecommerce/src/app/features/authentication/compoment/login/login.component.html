<div class="login-container">
  <h2>Đăng nhập</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form-content">
    <div class="form-group">
      <div class="input-container">
        <input
          type="text"
          formControlName="email"
          placeholder="Email"
          [ngClass]="{'error': loginForm.get('email')?.touched && loginForm.get('email')?.invalid}"
        />
      </div>
      <div class="error-message" *ngIf="getEmailError()">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        {{getEmailError()}}
      </div>
    </div>

    <div class="form-group password-group">
      <div class="input-container">
        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Mật khẩu"
          [ngClass]="{'error': loginForm.get('password')?.touched && loginForm.get('password')?.invalid}"
        />
        <button type="button" class="password-toggle-btn" (click)="togglePasswordVisibility()">
          <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>
      </div>
      <div class="error-message" *ngIf="getPasswordError()">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        {{getPasswordError()}}
      </div>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      {{errorMessage }}
    </div>

    <button
      type="submit"
      class="submit-btn"
      [disabled]="isLoading"
      [class.loading]="isLoading">
      <div class="btn-content">
        <svg *ngIf="isLoading" class="loading-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 11-6.219-8.56"/>
        </svg>
        <span class="btn-text">{{isLoading ? 'Đang đăng nhập...' : 'Đăng nhập'}}</span>
      </div>
    </button>
  </form>

  <div class="forgot-password">
    Hoặc <br> <a routerLink="/forgot-password">Quên mật khẩu</a>
  </div>

  <div class="register-link">
    <span>Nếu bạn chưa có tài khoản </span><a (click)="goToRegister()">đăng ký ngay</a>
  </div>
</div>
