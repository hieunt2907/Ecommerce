<!-- verify-otp-reset-password.component.html -->
<div class="decorative-element"></div>
<div class="decorative-element"></div>

<div class="verify-otp-container">
  <div class="icon-container">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 12l2 2 4-4"></path>
      <path d="M21 12c-1 0-3-1-3-3s2-3 3-3 3 1 3 3-2 3-3 3"></path>
      <path d="M3 12c1 0 3-1 3-3s-2-3-3-3-3 1-3 3 2 3 3 3"></path>
      <path d="M12 7.5V9a3 3 0 0 0 3 3h1.5"></path>
      <path d="M12 16.5V15a3 3 0 0 1-3-3H7.5"></path>
    </svg>
  </div>

  <h2>Xác thực OTP</h2>
  <p class="subtitle">
    Chúng tôi đã gửi mã 6 chữ số đến<br>
    <strong>{{email}}</strong>
  </p>

  <form (ngSubmit)="onSubmit()">
    <div class="otp-container">
      <input
        *ngFor="let _ of [1,2,3,4,5,6]; index as i"
        #otpInput
        type="text"
        maxlength="1"
        class="otp-input"
        [class.error]="errorMessage"
        [(ngModel)]="otpValues[i]"
        [ngModelOptions]="{standalone: true}"
        (input)="onOtpChange(i, $event)"
        (keydown)="onOtpKeyDown(i, $event)"
        (paste)="onOtpPaste($event)"
        autocomplete="one-time-code">
    </div>

    <div class="error-message" *ngIf="errorMessage">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      {{errorMessage}}
    </div>

    <button
      type="submit"
      class="submit-btn"
      [disabled]="isLoading || !isOtpComplete()"
      [class.loading]="isLoading">
      <div class="btn-content">
        <svg *ngIf="isLoading" class="loading-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 11-6.219-8.56"/>
        </svg>
        <span class="btn-text">{{isLoading ? 'Đang xác thực...' : 'Xác thực OTP'}}</span>
      </div>
    </button>
  </form>

  <div class="resend-section">
    <p class="resend-text">Không nhận được mã?</p>
    <button
      class="resend-btn"
      [disabled]="!canResend || isResending"
      (click)="resendOtp()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1,4 1,10 7,10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
      </svg>
      <span *ngIf="resendCooldown === 0">Gửi lại mã</span>
      <span *ngIf="resendCooldown > 0">Gửi lại sau {{resendCooldown}}s</span>
    </button>
  </div>

  <div class="back-section">
    <button class="back-btn" (click)="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15,18 9,12 15,6"></polyline>
      </svg>
      Quay lại
    </button>
  </div>
</div>
