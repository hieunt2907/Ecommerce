<div class="login-container">
  <h2>Quên mật khẩu?</h2>

  <div class="subtitle">
    Nhập email của bạn và chúng tôi sẽ gửi mã OTP để đặt lại mật khẩu
  </div>

  <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="form-content" *ngIf="!successMessage">
    <div class="form-group">
      <div class="input-container">
        <input
          type="email"
          formControlName="email"
          placeholder="Nhập email của bạn"
          [ngClass]="{'error': forgotPasswordForm.get('email')?.touched && forgotPasswordForm.get('email')?.invalid}"
        />
      </div>
      <div class="error-message" *ngIf="getEmailError()">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        {{getEmailError()}}
      </div>
    </div>

    <div class="error-message" *ngIf="errorMessage">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      {{errorMessage}}
    </div>

    <button
      type="submit"
      class="submit-btn"
      [disabled]="isLoading"
      [class.loading]="isLoading">
      <div class="btn-content">
        <svg *ngIf="isLoading" class="loading-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 11-6.219-8.56"/>
        </svg>
        <span class="btn-text">{{isLoading ? 'Đang gửi...' : 'Gửi OTP'}}</span>
        <!-- Arrow icon when not loading -->
        <svg *ngIf="!isLoading" class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12,5 19,12 12,19"></polyline>
        </svg>
      </div>

    </button>
  </form>

  <div class="back-to-login">
    <a routerLink="/login">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
