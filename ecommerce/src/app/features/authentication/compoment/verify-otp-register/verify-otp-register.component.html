<!-- verify-otp-register.component.html -->
<div class="decorative-element"></div>
<div class="decorative-element"></div>

<div class="verify-otp-container">
  <div class="icon-container">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
      <circle cx="9" cy="7" r="4"></circle>
      <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
    </svg>
  </div>

  <h2>Xác thực đăng ký</h2>
  <p class="subtitle">
    Vui lòng nhập mã xác thực 6 chữ số đã được gửi đến<br>
    <strong>{{email}}</strong>
  </p>

  <form (ngSubmit)="onSubmit()">
    <div class="otp-container">
      <input
        *ngFor="let _ of [1,2,3,4,5,6]; index as i"
        #otpInput
        type="text"
        maxlength="1"
        class="otp-input"
        [class.error]="errorMessage"
        [(ngModel)]="otpValues[i]"
        [ngModelOptions]="{standalone: true}"
        (input)="onOtpChange(i, $event)"
        (keydown)="onOtpKeyDown(i, $event)"
        (paste)="onOtpPaste($event)"
        autocomplete="one-time-code">
    </div>

    <div class="error-message" *ngIf="errorMessage">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
      {{errorMessage}}
    </div>

    <button
      type="submit"
      class="submit-btn"
      [disabled]="isLoading || !isOtpComplete()"
      [class.loading]="isLoading">
      <div class="btn-content">
        <svg *ngIf="isLoading" class="loading-spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 11-6.219-8.56"/>
        </svg>
        <span class="btn-text">{{isLoading ? 'Đang xác thực...' : 'Xác thực OTP'}}</span>
      </div>
    </button>
  </form>

  <div class="resend-section">
    <p class="resend-text">Không nhận được mã xác thực?</p>
    <button
      class="resend-btn"
      [disabled]="!canResend || isResending"
      (click)="onResendOtp()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1,4 1,10 7,10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
      </svg>
      <span *ngIf="resendCooldown === 0">Gửi lại mã</span>
      <span *ngIf="resendCooldown > 0">Gửi lại sau {{resendCooldown}}s</span>
    </button>
  </div>

  <div class="back-section">
    <button class="back-btn" (click)="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15,18 9,12 15,6"></polyline>
      </svg>
      Quay lại đăng ký
    </button>
  </div>
</div>
